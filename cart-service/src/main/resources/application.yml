spring:
  application:
    name: cart-service
  data:
    redis:
      host: ${REDIS_HOST:192.168.1.88}
      port: ${REDIS_PORT:30073}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:mypassword}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:192.168.1.88:9092}
    producer:
      properties:
        spring.json.add.type.headers: false

server:
  port: ${SERVER_PORT:8082}

catalog-service:
  base-url: ${CATALOG_SERVICE_URL:http://localhost:8081}

app:
  kafka:
    topics:
      cart-checkout: ${KAFKA_CART_CHECKOUT_TOPIC:cart.checkout}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
